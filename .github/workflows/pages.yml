name: Deploy a GitHub Pages

on:
  push:
    branches: ["claude/charming-cray-hyn2do", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar sitio estático (solo el front)
        run: |
          mkdir -p _site
          cp index.html styles.css app.js sites.js distributors.js _site/

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
